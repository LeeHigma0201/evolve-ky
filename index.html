function calcMarkup(){
  return `<div class="calc"><div>

function computeCalc(){
  const n=id=>parseFloat(document.getElementById(id).value)||0,ck=id=>document.getElementById(id).checked;
  const sqft=n('c_sqft'),panel=n('c_panel'),acTons=n('c_ac'),heatKW=n('c_heat'),evAmps=n('c_ev');
  let fixed=0; if(ck('c_range'))fixed+=8000; if(ck('c_dryer'))fixed+=5000; if(ck('c_wh'))fixed+=4500; if(ck('c_tub'))fixed+=6000;
  const before=sqft*3+2*1500+1*1500+fixed;
  const demand=Math.min(10000,before)+Math.max(0,before-10000)*0.4;
  const hvac=Math.max(acTons*1200,heatKW*1000*0.65);
  const existingA=(demand+hvac)/240,totalA=(demand+hvac+evAmps*240)/240;
  const safe=panel*0.8,status=totalA<=safe?'comfortable':(totalA<=panel?'tight':'exceeds');
  const headroom=Math.max(0,panel-totalA),util=panel?totalA/panel*100:0;
  const R=x=>Math.round(x).toLocaleString();
  document.getElementById('c_amps').textContent=R(totalA)+' A';
  document.getElementById('c_of').textContent='of '+R(panel)+' A service';
  document.getElementById('c_util').textContent=Math.round(util)+'% used';
  const scale=Math.max(panel,totalA)*1.08,p=x=>Math.min(100,x/scale*100);
  document.getElementById('z_g').style.width=p(panel*0.8)+'%';
  document.getElementById('z_a').style.width=(p(panel)-p(panel*0.8))+'%';
  document.getElementById('z_r').style.width=(100-p(panel))+'%';
  document.getElementById('c_fill').style.width=p(totalA)+'%';
  const tot=Math.max(p(totalA),0.001);
  document.getElementById('f_exist').style.width=(p(existingA)/tot*100)+'%';
  document.getElementById('f_ev').style.width=((p(totalA)-p(existingA))/tot*100)+'%';
  document.getElementById('c_limit').style.left=p(panel)+'%';
  const msg={
    comfortable:['&#10003; You&rsquo;ve got room. No upgrade needed.','That&rsquo;s '+R(headroom)+' A to spare &mdash; and likely a few thousand dollars you keep.'],
    tight:['It fits &mdash; but it&rsquo;s tight.','Only '+R(headroom)+' A left. Load management is the smart, cheaper fix (not a whole new panel).'],
    exceeds:['This one really does need attention.','You&rsquo;re past the limit &mdash; the ~1 in 5 where an upgrade or load management is honest advice.']
  }[status];
  document.getElementById('c_verdict').innerHTML=`<div class="verdict v-${status}">${msg[0]}<small>${msg[1]}</small></div>`;
}
function wireCalc(){
  document.getElementById('chead').innerHTML=slides[i].head;
  ['c_sqft','c_panel','c_ac','c_heat','c_ev','c_range','c_dryer','c_wh','c_tub'].forEach(id=>{
    const el=document.getElementById(id); el.addEventListener('input',computeCalc); el.addEventListener('change',computeCalc);});
  computeCalc();
}
function chrome(){return `<div class="brand">${MARK}${WORD}</div><div class="foot">← → move · N notes</div><div class="count"><b>${String(i+1).padStart(2,'0')}</b> / ${slides.length}</div>`;}
function render(){
  const s=slides[i]; let inner='';
  if(s.type==='title'){
    inner=`<div class="logo-lg">${MARK}${WORD}</div>
      <p class="kicker">Evolve Kentucky · July 26</p>
      <h1>Do you really need a <span class="hl">panel upgrade</span> for your EV charger?</h1>
      <p class="body" style="max-width:34ch">Usually not. Let me save you a few thousand dollars.</p>
      <p class="byline">Jason Walls · Master Electrician · IBEW 369 · <span class="link">evchargeright.com</span></p>`;
    stage.innerHTML=`<section class="slide active">${inner}<div class="foot">← → move · N notes</div><div class="count"><b>01</b> / ${slides.length}</div></section>`;
  } else {
    if(s.type==='calc') inner=`<p class="kicker">${s.label}</p>`+calcMarkup();
    else if(s.type==='anchor') inner=`<p class="kicker">${s.label}</p><h2>${s.head}</h2><div class="big">${s.big}</div><p class="caplabel">${s.caplabel}</p><p class="body">${s.body}</p>`;
    else if(s.type==='stat') inner=`<p class="kicker">${s.label}</p><h2>${s.head}</h2><div class="big">${s.big}</div><div class="houses">${HOUSE('h-ok')}${HOUSE('h-ok')}${HOUSE('h-ok')}${HOUSE('h-ok')}${HOUSE('h-no')}<span class="tag">= have room</span></div><p class="body">${s.body}</p>`;
    else if(s.type==='product') inner=`<p class="kicker">${s.label}</p><h2>${s.head}</h2><div class="steps"><div class="step">${IC.camera}<h4>1 · Snap a photo</h4><p>One picture of your panel.</p></div><div class="arrow">→</div><div class="step">${IC.calc}<h4>2 · It runs the math</h4><p>The exact NEC 220.82 calc.</p></div><div class="arrow">→</div><div class="step">${IC.check}<h4>3 · Plain answer</h4><p>Room, or not. In English.</p></div></div><p class="body" style="max-width:42ch">${s.body} <span class="link">evchargeright.com</span></p>`;
    else if(s.type==='quote') inner=`<p class="kicker">${s.label}</p><h2>${s.head}</h2><p class="quote">&ldquo;${s.quote}&rdquo;</p>`;
    else if(s.type==='close') inner=`<p class="kicker">${s.label}</p><div class="close"><div><h2>${s.head}</h2><p class="body">${s.body}</p><p class="byline"><span class="link">${s.url}</span></p></div><div><div class="qrbox"><img src="qr.svg" alt="QR to evchargeright.com"></div><div class="qrcap">Scan it — or text it to someone about to buy an EV</div></div></div>`;
    else inner=`<p class="kicker">${s.label}</p><h2>${s.head}</h2><p class="body">${s.body}</p>`;
    stage.innerHTML=`<section class="slide active">${chrome()}${inner}</section>`;
    if(s.type==='calc') wireCalc();
  }
  bar.style.width=(i/(slides.length-1)*100)+'%';
  ntext.innerHTML=s.note||'';
}
function go(x){i=Math.max(0,Math.min(slides.length-1,x));notesEl.classList.remove('show');notesOpen=false;render();}
document.getElementById('next').addEventListener('click',e=>{e.stopPropagation();go(i+1);});
document.getElementById('prev').addEventListener('click',e=>{e.stopPropagation();go(i-1);});
document.addEventListener('keydown',e=>{
  const t=(e.target.tagName||'').toLowerCase(),inF=t==='input'||t==='select'||t==='textarea';
  if(e.key.toLowerCase()==='n'&&!inF){notesOpen=!notesOpen;notesEl.classList.toggle('show',notesOpen);return;}
  if(inF)return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(i+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(i-1);}
  else if(e.key==='Home')go(0); else if(e.key==='End')go(slides.length-1);
});
document.addEventListener('click',e=>{if(e.target.closest('input,select,button,label,a,.calc,.nav,#notes,.out'))return;go(e.clientX>window.innerWidth/2?i+1:i-1);});
render();
</script>
</body>
</html>
