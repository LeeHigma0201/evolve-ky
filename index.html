<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Do you really need a panel upgrade? · Evolve KY</title>
<meta name="description" content="Jason Walls — Evolve KY, July 26. Do you really need a panel upgrade for your EV charger? Usually not.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1ea; --ink:#1c1a17; --muted:#5c574e; --accent:#e0531d;
    --card:#faf8f2; --line:#e6e1d6;
    --green:#2e7d4f; --amber:#c77d16; --red:#c0392b;
    --sans:"Archivo",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    display:flex;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased}
  #bar{position:fixed;top:0;left:0;height:4px;background:var(--accent);width:0;transition:width .25s ease;z-index:5}
  .stage{width:min(1040px,94vw);height:min(640px,92vh);position:relative}
  .slide{position:absolute;inset:0;background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:clamp(26px,4.6vw,60px);display:none;flex-direction:column;justify-content:center;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.35)}
  .slide.active{display:flex}
  .slide::before{content:"";position:absolute;top:0;left:clamp(26px,4.6vw,60px);width:44px;height:8px;background:var(--accent);border-radius:0 0 3px 3px}
  .kicker{font-size:clamp(11px,1.3vw,13px);font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 clamp(14px,2.4vw,24px)}
  .label{font-size:clamp(11px,1.3vw,13px);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 clamp(10px,1.8vw,18px)}
  h1{font-weight:900;line-height:1.02;letter-spacing:-.02em;margin:0;font-size:clamp(28px,5.2vw,58px);max-width:16ch}
  h2{font-weight:800;line-height:1.05;letter-spacing:-.015em;margin:0;font-size:clamp(24px,4.2vw,48px);max-width:18ch}
  .body{margin:clamp(14px,2.4vw,24px) 0 0;font-size:clamp(16px,2.2vw,25px);line-height:1.4;color:var(--muted);font-weight:400;max-width:30ch}
  .lead{color:var(--ink);font-weight:600}
  .url{color:var(--accent);font-weight:600}
  .byline{margin-top:clamp(18px,3.4vw,36px);font-size:clamp(13px,1.6vw,16px);font-weight:600;color:var(--ink)}
  .foot{position:absolute;left:clamp(26px,4.6vw,60px);bottom:clamp(18px,2.6vw,26px);font-family:var(--mono);font-size:12px;color:#a49d8e}
  .count{position:absolute;right:clamp(26px,4.6vw,60px);bottom:clamp(18px,2.6vw,26px);font-family:var(--mono);font-size:13px;color:var(--muted)}
  /* on-screen nav — always works, independent of focus */
  .nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:7}
  .nav button{font-family:var(--mono);font-size:16px;line-height:1;border:1px solid var(--line);background:var(--card);color:var(--muted);
    width:40px;height:34px;border-radius:8px;cursor:pointer}
  .nav button:hover{border-color:var(--accent);color:var(--accent)}
  /* notes */
  #notes{position:fixed;left:0;right:0;bottom:0;max-height:42vh;overflow:auto;background:#1c1a17;color:#f4f1ea;
    padding:20px clamp(24px,6vw,80px);font-size:15px;line-height:1.5;transform:translateY(101%);transition:transform .25s ease;z-index:6;border-top:3px solid var(--accent)}
  #notes.show{transform:translateY(0)}
  #notes .nlabel{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  /* ---- live calculator ---- */
  .calc{display:grid;grid-template-columns:1.05fr 1fr;gap:clamp(16px,2.6vw,34px);align-items:start;width:100%;margin-top:6px}
  .calc h2{font-size:clamp(20px,3vw,30px);margin-bottom:14px}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px}
  .fields .full{grid-column:1/3}
  .fld{display:flex;flex-direction:column;gap:3px}
  .fld label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .fld input[type=number],.fld select{font-family:var(--sans);font-size:16px;font-weight:600;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:7px;padding:8px 9px;width:100%}
  .toggles{grid-column:1/3;display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
  .tog{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 11px;cursor:pointer;user-select:none}
  .tog input{accent-color:var(--accent);width:15px;height:15px}
  /* result card */
  .out{background:#fff;border:1px solid var(--line);border-radius:10px;padding:clamp(16px,2.4vw,24px);align-self:stretch}
  .rows{font-family:var(--mono);font-size:14px;color:var(--muted);margin:0 0 12px}
  .rows .r{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--line)}
  .rows .r.total{color:var(--ink);font-weight:600;border-bottom:none;font-size:16px;padding-top:8px}
  .verdict{border-radius:9px;padding:14px 16px;font-weight:800;font-size:clamp(16px,2.1vw,21px);line-height:1.2}
  .verdict small{display:block;font-family:var(--mono);font-weight:500;font-size:12px;margin-top:6px;opacity:.85}
  .v-comfortable{background:rgba(46,125,79,.12);color:var(--green);border:1px solid rgba(46,125,79,.35)}
  .v-tight{background:rgba(199,125,22,.12);color:var(--amber);border:1px solid rgba(199,125,22,.35)}
  .v-exceeds{background:rgba(192,57,43,.10);color:var(--red);border:1px solid rgba(192,57,43,.35)}
  .cite{font-family:var(--mono);font-size:11px;color:#a49d8e;margin-top:12px}
  @media (prefers-color-scheme: dark){
    :root{--bg:#14120f;--ink:#f4f1ea;--muted:#b8b1a3;--card:#1e1b17;--line:#2c2822}
    .fld input,.fld select,.tog,.out{background:#14120f}
  }
  @media (max-width:820px){ .calc{grid-template-columns:1fr} }
</style>
</head>
<body>
<div id="bar"></div>
<div class="stage" id="stage"></div>
<div class="nav"><button id="prev" aria-label="Previous">&lsaquo;</button><button id="next" aria-label="Next">&rsaquo;</button></div>
<div id="notes"><div class="nlabel">Speaker note</div><div id="ntext"></div></div>

<script>
const slides = [
  { title:true, kicker:"EVOLVE KENTUCKY · JULY 26",
    head:"Do you really need a panel upgrade for your EV charger?",
    body:"Usually not. Let me save you a few thousand dollars.",
    byline:"Jason Walls &middot; Master Electrician &middot; evchargeright.com",
    note:"Open warm. You're the honest electrician, not a salesman. Promise: I'm going to save most of you money today." },
  { label:"Who I am", head:"I&rsquo;m Jason. I&rsquo;m a master electrician.",
    body:"I built a simple tool because I got tired of watching good people pay for upgrades they never needed.",
    note:"Credibility + motive. You built ChargeRight because you saw the problem in the field." },
  { label:"The moment", head:"You bought the car.",
    body:"Then someone quoted you $3,000 to $5,000 to upgrade your panel before you can charge it at home.",
    note:"Name the shared pain. Most of the room has lived this quote." },
  { label:"The truth", head:"Most of you don&rsquo;t need it.",
    body:"In the homes I check, about four out of five already have the room.",
    note:"Headline stat — framed as YOUR field experience, not a national claim. Keep it that way." },
  { label:"Straight talk", head:"And here&rsquo;s who actually does.",
    body:"Older homes on a small panel that&rsquo;s already full. All-electric houses near their limit — heat and range and water heater all pulling at once. If that&rsquo;s you, I&rsquo;ll tell you straight. Knowing the difference is the whole point.",
    note:"Trust: you'll tell people when they DO need it. That honesty is the whole credibility hook." },
  { label:"So why the quote?", head:"So why the big quote?",
    body:"Some installers skip the ten-minute math and just sell the upgrade. It&rsquo;s faster, and it pays more.",
    note:"The villain is the lazy upsell, not EVs. Sets up the live math on the next slide." },
  { type:"calc", label:"The math — live",
    head:"Here&rsquo;s what checking your house actually looks like.",
    note:"THE moment. Ask the room for a real house — sq ft, service size (100/150/200A), gas or electric range/dryer/water heater, AC tonnage, charger amps. Type it in. Let them watch the verdict land. This is NEC 220.82 — the same calc I'd run on paper. Then: 'That's my job, not yours — you just need the answer.'" },
  { label:"This is ChargeRight", head:"Snap a photo. Get the real answer.",
    body:"ChargeRight reads your panel from a photo and runs that exact NEC 220.82 load calc — then tells you in plain English whether you have room. The same math a licensed electrician runs, minus the sales pitch.",
    url:"evchargeright.com",
    note:"Tie the live demo to the product: what you just watched me do by hand, the app does from one photo. That's the whole thing." },
  { label:"In plain terms", head:"It&rsquo;s about like adding an electric range.",
    body:"A charger runs on the same kind of 240-volt circuit. Plug in at night, wake up full. Most of us drive about 40 miles a day. You&rsquo;ll have plenty.",
    note:"Demystify. (Fixed: 'dryer' → 'electric range' — an L2 charger often pulls more than a dryer, closer to a range.)" },
  { label:"How to know yours", head:"Don&rsquo;t guess. And don&rsquo;t just trust the quote.",
    body:"See me here today and I&rsquo;ll check yours for free. Or go to evchargeright.com and it does the math for you.",
    note:"CTA. (Fixed: 'tonight' → 'here today' — it's a 2:30–4:30 PM Sunday meeting.) Offer the free live check to anyone in the room." },
  { label:"Before you go", head:"Don&rsquo;t pay thousands for something you don&rsquo;t need.",
    body:"And tell the friend who&rsquo;s about to.", url:"evchargeright.com",
    note:"Close on the referral — word of mouth in this room is the growth engine." },
];

const stage=document.getElementById('stage'), bar=document.getElementById('bar');
const notesEl=document.getElementById('notes'), ntext=document.getElementById('ntext');
let i=0, notesOpen=false;

function calcMarkup(){
  return `<div class="calc">
    <div>
      <h2 id="chead"></h2>
      <div class="fields">
        <div class="fld"><label>Home size (ft²)</label><input type="number" id="c_sqft" value="2000" min="0" step="100"></div>
        <div class="fld"><label>Service size (A)</label>
          <select id="c_panel"><option>100</option><option>125</option><option>150</option><option selected>200</option></select></div>
        <div class="fld"><label>Central AC (tons)</label><input type="number" id="c_ac" value="3" min="0" step="0.5"></div>
        <div class="fld"><label>Electric heat (kW, 0=gas)</label><input type="number" id="c_heat" value="0" min="0" step="1"></div>
        <div class="fld"><label>EV charger (amps)</label>
          <select id="c_ev"><option>32</option><option>40</option><option selected>48</option></select></div>
        <div class="fld"><label>&nbsp;</label><div style="font-family:var(--mono);font-size:12px;color:#a49d8e;padding-top:10px">240V circuit</div></div>
        <div class="toggles">
          <label class="tog"><input type="checkbox" id="c_range" checked>Electric range</label>
          <label class="tog"><input type="checkbox" id="c_dryer" checked>Electric dryer</label>
          <label class="tog"><input type="checkbox" id="c_wh">Electric water heater</label>
          <label class="tog"><input type="checkbox" id="c_tub">Hot tub</label>
        </div>
      </div>
      <div class="cite">NEC 220.82 optional method &middot; 3 VA/ft² &middot; 10 kVA @100% + 40% &middot; verdict vs service per 230.79</div>
    </div>
    <div class="out">
      <div class="rows" id="c_rows"></div>
      <div id="c_verdict"></div>
    </div>
  </div>`;
}

function computeCalc(){
  const n=id=>parseFloat(document.getElementById(id).value)||0;
  const ck=id=>document.getElementById(id).checked;
  const sqft=n('c_sqft'), panel=n('c_panel'), acTons=n('c_ac'), heatKW=n('c_heat'), evAmps=n('c_ev');
  let fixed=0; if(ck('c_range'))fixed+=8000; if(ck('c_dryer'))fixed+=5000; if(ck('c_wh'))fixed+=4500; if(ck('c_tub'))fixed+=6000;
  const before = sqft*3 + 2*1500 + 1*1500 + fixed;                 // 220.82(B)
  const demand = Math.min(10000,before) + Math.max(0,before-10000)*0.4;
  const hvac = Math.max(acTons*1200, heatKW*1000*0.65);            // 220.82(C): larger of cooling / heat
  const evVA = evAmps*240;
  const existingA = (demand+hvac)/240;
  const totalA = (demand+hvac+evVA)/240;
  const safe = panel*0.8;
  const status = totalA<=safe ? 'comfortable' : (totalA<=panel ? 'tight' : 'exceeds');
  const headroom = Math.max(0, panel-totalA);
  const util = panel? totalA/panel*100 : 0;
  const A=x=>Math.round(x).toLocaleString();
  document.getElementById('c_rows').innerHTML =
    `<div class="r"><span>Home + appliances + HVAC</span><span>${A(existingA)} A</span></div>
     <div class="r"><span>+ EV charger (${A(evAmps)} A)</span><span>${A(evVA/240)} A</span></div>
     <div class="r total"><span>Total load</span><span>${A(totalA)} A of ${A(panel)} A &middot; ${Math.round(util)}%</span></div>`;
  const msg = {
    comfortable:['&#9989; Room to spare — no panel upgrade needed.', `${A(headroom)} A of headroom left on a ${A(panel)} A service.`],
    tight:      ['&#9888;&#65039; It fits — but it&rsquo;s tight.', `Only ${A(headroom)} A to spare. Load management is the smart, cheaper fix.`],
    exceeds:    ['&#128308; Over the service rating.', `This is the ~1 in 5 that genuinely needs an upgrade or load management.`]
  }[status];
  document.getElementById('c_verdict').innerHTML =
    `<div class="verdict v-${status}">${msg[0]}<small>${msg[1]}</small></div>`;
}

function wireCalc(){
  document.getElementById('chead').innerHTML = slides[i].head;
  ['c_sqft','c_panel','c_ac','c_heat','c_ev','c_range','c_dryer','c_wh','c_tub'].forEach(id=>{
    const el=document.getElementById(id);
    el.addEventListener('input',computeCalc);
    el.addEventListener('change',computeCalc);
  });
  computeCalc();
}

function render(){
  const s=slides[i]; let inner='';
  if(s.type==='calc'){
    inner += `<p class="label">${s.label}</p>` + calcMarkup();
  } else if(s.title){
    inner += `<p class="kicker">${s.kicker}</p><h1>${s.head}</h1><p class="body lead">${s.body}</p>`;
    if(s.byline) inner += `<p class="byline">${s.byline}</p>`;
  } else {
    if(s.label) inner += `<p class="label">${s.label}</p>`;
    inner += `<h2>${s.head}</h2>`;
    if(s.body) inner += `<p class="body"><span class="lead">${s.body}</span></p>`;
    if(s.url) inner += `<p class="byline"><span class="url">${s.url}</span></p>`;
  }
  inner += `<div class="foot">&larr; &rarr; to move &middot; press N for notes</div><div class="count">${i+1} / ${slides.length}</div>`;
  stage.innerHTML = `<section class="slide active">${inner}</section>`;
  bar.style.width = (i/(slides.length-1)*100)+'%';
  ntext.innerHTML = s.note||'';
  if(s.type==='calc') wireCalc();
}
function go(n){ i=Math.max(0,Math.min(slides.length-1,n)); notesEl.classList.remove('show'); notesOpen=false; render(); }

document.getElementById('next').addEventListener('click',e=>{e.stopPropagation();go(i+1);});
document.getElementById('prev').addEventListener('click',e=>{e.stopPropagation();go(i-1);});

document.addEventListener('keydown', e=>{
  const t=(e.target.tagName||'').toLowerCase();
  const inField = t==='input'||t==='select'||t==='textarea';
  if(e.key.toLowerCase()==='n' && !inField){ notesOpen=!notesOpen; notesEl.classList.toggle('show',notesOpen); return; }
  if(inField) return;                         // don't hijack keys while typing in the calculator
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); go(i+1); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); go(i-1); }
  else if(e.key==='Home'){ go(0); } else if(e.key==='End'){ go(slides.length-1); }
});
// click background to advance — but never when interacting with the calculator/controls
document.addEventListener('click', e=>{
  if(e.target.closest('input,select,button,label,a,.calc,.nav,#notes')) return;
  go(e.clientX > window.innerWidth/2 ? i+1 : i-1);
});
render();
</script>
</body>
</html>
