<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Do you really need a panel upgrade? · Evolve KY</title>
<meta name="description" content="Jason Walls — Evolve KY, July 26. Do you really need a panel upgrade for your EV charger? Usually not.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f1ea;
    --ink:#1c1a17;
    --muted:#5c574e;
    --accent:#e0531d;      /* ChargeRight orange */
    --card:#faf8f2;
    --line:#e6e1d6;
    --sans:"Archivo",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* progress bar */
  #bar{position:fixed;top:0;left:0;height:4px;background:var(--accent);width:0;transition:width .25s ease;z-index:5}
  .stage{width:min(1040px,92vw);height:min(620px,90vh);position:relative}
  .slide{
    position:absolute;inset:0;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:clamp(28px,5vw,64px);
    display:none;flex-direction:column;justify-content:center;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.35);
  }
  .slide.active{display:flex}
  /* top-left accent square */
  .slide::before{content:"";position:absolute;top:0;left:clamp(28px,5vw,64px);width:44px;height:8px;background:var(--accent);border-radius:0 0 3px 3px}
  .kicker{font-size:clamp(11px,1.3vw,13px);font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 clamp(14px,2.5vw,26px)}
  .label{font-size:clamp(11px,1.3vw,13px);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 clamp(12px,2vw,20px)}
  h1{font-weight:900;line-height:1.02;letter-spacing:-.02em;margin:0;font-size:clamp(30px,5.6vw,60px);max-width:16ch}
  h2{font-weight:800;line-height:1.05;letter-spacing:-.015em;margin:0;font-size:clamp(26px,4.6vw,50px);max-width:18ch}
  .body{margin:clamp(16px,2.6vw,26px) 0 0;font-size:clamp(17px,2.3vw,26px);line-height:1.4;color:var(--muted);font-weight:400;max-width:30ch}
  .lead{color:var(--ink);font-weight:600}
  .url{color:var(--accent);font-weight:600}
  .byline{margin-top:clamp(20px,4vw,40px);font-size:clamp(13px,1.6vw,16px);font-weight:600;color:var(--ink)}
  /* footer hint + counter */
  .foot{position:absolute;left:clamp(28px,5vw,64px);bottom:clamp(20px,3vw,30px);font-family:var(--mono);font-size:12px;color:#a49d8e}
  .count{position:absolute;right:clamp(28px,5vw,64px);bottom:clamp(20px,3vw,30px);font-family:var(--mono);font-size:13px;color:var(--muted)}
  /* notes overlay */
  #notes{position:fixed;left:0;right:0;bottom:0;max-height:42vh;overflow:auto;background:#1c1a17;color:#f4f1ea;
    padding:20px clamp(24px,6vw,80px);font-size:15px;line-height:1.5;transform:translateY(101%);transition:transform .25s ease;z-index:6;border-top:3px solid var(--accent)}
  #notes.show{transform:translateY(0)}
  #notes .nlabel{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  @media (prefers-color-scheme: dark){
    :root{--bg:#14120f;--ink:#f4f1ea;--muted:#b8b1a3;--card:#1e1b17;--line:#2c2822}
  }
</style>
</head>
<body>
<div id="bar"></div>
<div class="stage" id="stage"></div>
<div id="notes"><div class="nlabel">Speaker note</div><div id="ntext"></div></div>

<script>
const slides = [
  { title:true, kicker:"EVOLVE KENTUCKY · JULY 26",
    head:"Do you really need a panel upgrade for your EV charger?",
    body:"Usually not. Let me save you a few thousand dollars.",
    byline:"Jason Walls &middot; Master Electrician &middot; evchargeright.com",
    note:"Open warm. You're the honest electrician, not a salesman. Set the promise: I'm going to save most of you money tonight." },
  { label:"Who I am", head:"I&rsquo;m Jason. I&rsquo;m a master electrician.",
    body:"I built a simple tool because I got tired of watching good people pay for upgrades they never needed.",
    note:"Establish credibility + motive. You built ChargeRight because you saw the problem in the field." },
  { label:"The moment", head:"You bought the car.",
    body:"Then someone quoted you $3,000 to $5,000 to upgrade your panel before you can charge it at home.",
    note:"Name the shared pain. Most of the room has lived this quote." },
  { label:"The truth", head:"Most of you don&rsquo;t need it.",
    body:"In the homes I check, about four out of five already have the room.",
    note:"The headline stat. Framed as YOUR field experience, not a national claim — keep it that way." },
  { label:"Straight talk", head:"And here&rsquo;s who actually does.",
    body:"Older homes on a small panel that&rsquo;s already full. All-electric houses near their limit — heat and range and water heater all pulling at once. If that&rsquo;s you, I&rsquo;ll tell you straight. Knowing the difference is the whole point.",
    note:"Honesty builds trust: you'll tell people when they DO need it. That's the credibility hook." },
  { label:"So why the quote?", head:"So why the big quote?",
    body:"Some installers skip the ten-minute math and just sell the upgrade. It&rsquo;s faster, and it pays more.",
    note:"The villain isn't EVs — it's the lazy upsell. Positions ChargeRight as the fix." },
  { label:"The math", head:"Here&rsquo;s what checking your house looks like.",
    body:"That&rsquo;s my job, not yours. You just need the answer.",
    note:"This is the natural spot to SHOW ChargeRight — the NEC 220.82 load calc from a panel photo. (See README: product-display slide pending.)" },
  { label:"In plain terms", head:"It&rsquo;s about like adding a dryer.",
    body:"A charger runs on the same kind of circuit. Plug in at night, wake up full. Most of us drive 40 miles a day. You&rsquo;ll have plenty.",
    note:"Demystify. (Audit note: many L2 chargers pull more than a dryer — consider 'an electric range.')" },
  { label:"How to know yours", head:"Don&rsquo;t guess. And don&rsquo;t just trust the quote.",
    body:"See me tonight and I&rsquo;ll check yours for free. Or go to evchargeright.com and it does the math for you.",
    note:"CTA. (Audit note: meeting is 2:30–4:30 PM Sunday — 'tonight' should be 'here today'.) Do a LIVE check on a real attendee's panel if you can." },
  { label:"Before you go", head:"Don&rsquo;t pay thousands for something you don&rsquo;t need.",
    body:"And tell the friend who&rsquo;s about to.", url:"evchargeright.com",
    note:"Close on the referral. Word of mouth in this room is the whole growth engine." },
];

const stage = document.getElementById('stage');
const bar = document.getElementById('bar');
const notesEl = document.getElementById('notes');
const ntext = document.getElementById('ntext');
let i = 0, notesOpen = false;

function render(){
  const s = slides[i];
  let inner = '';
  if(s.title){
    inner += `<p class="kicker">${s.kicker}</p><h1>${s.head}</h1>`;
    inner += `<p class="body lead">${s.body}</p>`;
    if(s.byline) inner += `<p class="byline">${s.byline}</p>`;
  } else {
    if(s.label) inner += `<p class="label">${s.label}</p>`;
    inner += `<h2>${s.head}</h2>`;
    if(s.body) inner += `<p class="body"><span class="lead">${s.body}</span></p>`;
    if(s.url) inner += `<p class="byline"><span class="url">${s.url}</span></p>`;
  }
  inner += `<div class="foot">&larr; &rarr; to move &middot; press N for notes</div>`;
  inner += `<div class="count">${i+1} / ${slides.length}</div>`;
  stage.innerHTML = `<section class="slide active">${inner}</section>`;
  bar.style.width = ((i)/(slides.length-1)*100) + '%';
  ntext.innerHTML = slides[i].note || '';
}
function go(n){ i = Math.max(0, Math.min(slides.length-1, n)); render(); }

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); go(i+1); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); go(i-1); }
  else if(e.key==='Home'){ go(0); }
  else if(e.key==='End'){ go(slides.length-1); }
  else if(e.key.toLowerCase()==='n'){ notesOpen=!notesOpen; notesEl.classList.toggle('show', notesOpen); }
});
// tap/click right half = next, left half = prev
document.addEventListener('click', e=>{
  if(e.target.closest('#notes')) return;
  go(e.clientX > window.innerWidth/2 ? i+1 : i-1);
});
render();
</script>
</body>
</html>
